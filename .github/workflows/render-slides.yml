name: Render slide images

# Regenerate slide PNGs whenever the pptx (or this workflow / build script)
# changes, and commit them into docs/slides/ so the static Pages site
# (served from /docs) immediately picks them up. Commit message ends with
# "[skip ci]" so re-committing images doesn't re-trigger the workflow.

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'SOM_PC_26_Slides.pptx'
      - 'build.py'
      - '.github/workflows/render-slides.yml'
  workflow_dispatch:

permissions:
  contents: write

# NOTE: we deliberately do NOT use `set -u` — several external scripts that
# shells invoke (apt postinsts, setup-python) reference unset vars.
defaults:
  run:
    shell: bash -exo pipefail {0}

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Diagnostics — runner info
        run: |
          echo "runner.os       = ${RUNNER_OS}"
          echo "runner.temp     = ${RUNNER_TEMP}"
          echo "GITHUB_REF_NAME = ${GITHUB_REF_NAME}"
          uname -a
          lsb_release -a || cat /etc/os-release
          df -h / | tail -1
          pwd
          ls -la

      - name: Install LibreOffice + renderers + fonts
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libreoffice \
            poppler-utils \
            mupdf-tools \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-cjk \
            fontconfig
          fc-cache -f
          which soffice pdftoppm mutool
          soffice --version
          pdftoppm -v 2>&1 | head -2 || true
          mutool -v 2>&1 | head -2 || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install python-pptx

      - name: Rebuild slides.json
        run: python build.py

      - name: Convert pptx -> pdf
        id: pdf
        run: |
          mkdir -p build
          # Use an isolated user profile for soffice; avoids the first-run
          # "source file could not be loaded" race when $HOME is pre-populated.
          LO_PROFILE="${RUNNER_TEMP}/lo-profile"
          mkdir -p "${LO_PROFILE}"
          soffice \
            --headless \
            --norestore \
            --nolockcheck \
            --nodefault \
            --nofirststartwizard \
            "-env:UserInstallation=file://${LO_PROFILE}" \
            --convert-to pdf \
            --outdir build \
            SOM_PC_26_Slides.pptx
          ls -la build/
          test -s build/SOM_PC_26_Slides.pdf

      - name: Render PDF -> per-slide PNGs
        id: render_pngs
        # Do NOT use set -e here — we want to try multiple renderers and
        # always reach the diagnostic + (possibly partial) commit afterwards.
        shell: bash -xo pipefail {0}
        run: |
          mkdir -p docs/slides
          echo "=== pdfinfo ==="
          pdfinfo build/SOM_PC_26_Slides.pdf || true
          PAGES=$(pdfinfo build/SOM_PC_26_Slides.pdf 2>/dev/null | awk '/^Pages:/ {print $2}')
          PAGES=${PAGES:-0}
          echo "detected $PAGES pages"

          echo "=== try pdftoppm for slides (1920) ==="
          pdftoppm -png -scale-to 1920 \
            build/SOM_PC_26_Slides.pdf docs/slides/slide
          RC_SLIDES_PT=$?
          echo "pdftoppm slides rc=${RC_SLIDES_PT}"

          echo "=== try pdftoppm for thumbs (480) ==="
          pdftoppm -png -scale-to 480 \
            build/SOM_PC_26_Slides.pdf docs/slides/thumb
          RC_THUMBS_PT=$?
          echo "pdftoppm thumbs rc=${RC_THUMBS_PT}"

          SLIDE_COUNT=$(ls docs/slides/slide-*.png 2>/dev/null | wc -l)
          THUMB_COUNT=$(ls docs/slides/thumb-*.png 2>/dev/null | wc -l)
          echo "after pdftoppm: slides=${SLIDE_COUNT} thumbs=${THUMB_COUNT}"

          # Fall back to mutool if pdftoppm produced fewer than expected
          if [ "${SLIDE_COUNT}" -lt "${PAGES}" ] || [ "${SLIDE_COUNT}" -eq 0 ]; then
            echo "=== fallback: mutool for slides (1920) ==="
            rm -f docs/slides/slide-*.png
            mutool draw -o docs/slides/slide-%d.png -w 1920 \
              build/SOM_PC_26_Slides.pdf
            echo "mutool slides rc=$?"
          fi
          if [ "${THUMB_COUNT}" -lt "${PAGES}" ] || [ "${THUMB_COUNT}" -eq 0 ]; then
            echo "=== fallback: mutool for thumbs (480) ==="
            rm -f docs/slides/thumb-*.png
            mutool draw -o docs/slides/thumb-%d.png -w 480 \
              build/SOM_PC_26_Slides.pdf
            echo "mutool thumbs rc=$?"
          fi

          # Zero-pad filenames so lexical order = slide order
          cd docs/slides
          for prefix in slide thumb; do
            for f in ${prefix}-*.png; do
              [ -e "$f" ] || continue
              n=$(echo "$f" | sed -E "s/${prefix}-([0-9]+)\.png/\1/")
              nz=$(printf '%02d' "$n")
              [ "$f" = "${prefix}-${nz}.png" ] || mv "$f" "${prefix}-${nz}.png"
            done
          done

          SLIDE_COUNT=$(ls slide-*.png 2>/dev/null | wc -l)
          THUMB_COUNT=$(ls thumb-*.png 2>/dev/null | wc -l)
          echo "final: slides=${SLIDE_COUNT} thumbs=${THUMB_COUNT}"
          du -sh .

          # Fail the step only if we produced nothing usable
          if [ "${SLIDE_COUNT}" -lt 1 ]; then
            echo "FATAL: no slide PNGs produced"
            exit 1
          fi

      - name: Diagnostics — final state before commit
        if: always()
        run: |
          echo "=== build/ ==="
          ls -la build/ 2>&1 || true
          echo "=== docs/slides/ ==="
          ls -la docs/slides/ 2>&1 | head -20 || true
          echo "=== docs/slides count ==="
          find docs/slides -name 'slide-*.png' 2>/dev/null | wc -l
          find docs/slides -name 'thumb-*.png' 2>/dev/null | wc -l
          echo "=== git status ==="
          git status --short

      - name: Commit rendered assets back to the branch
        if: success()
        run: |
          git config user.name  "som-slides-bot"
          git config user.email "som-slides-bot@users.noreply.github.com"
          git add docs/slides docs/slides.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Render slide images [skip ci]"
          # If the branch moved forward during the run, rebase onto remote
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
