name: Render slide images

# Regenerate slide PNGs whenever the pptx (or this workflow / build script)
# changes. Images are committed back into docs/slides so the static
# GitHub Pages site (served from /docs) immediately picks them up.
#
# The commit message ends with "[skip ci]" so re-committing the images
# doesn't re-trigger the workflow.

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'SOM_PC_26_Slides.pptx'
      - 'build.py'
      - '.github/workflows/render-slides.yml'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch full history so we can rebase + push back cleanly
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice + poppler + fonts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libreoffice-impress \
            libreoffice-core \
            poppler-utils \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto-core
          # Verify the tools are available
          which soffice pdftoppm
          soffice --version
          pdftoppm -v 2>&1 | head -2 || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install python-pptx

      - name: Rebuild slides.json (titles + count)
        run: python build.py

      - name: Convert pptx -> pdf
        env:
          # Force soffice to create its profile in a writable, unique path
          # — avoids the "source file could not be loaded" race on first run.
          HOME: ${{ runner.temp }}/lo-home
        run: |
          mkdir -p "$HOME" build
          soffice \
            --headless \
            --norestore \
            --nolockcheck \
            --nodefault \
            --nofirststartwizard \
            -env:UserInstallation=file://$HOME/.lo-profile \
            --convert-to pdf \
            --outdir build \
            SOM_PC_26_Slides.pptx
          ls -la build/
          test -s build/SOM_PC_26_Slides.pdf

      - name: Render PDF -> per-slide PNGs
        run: |
          mkdir -p docs/slides
          # -scale-to N sets both max dimensions, preserving aspect. A 16:9 slide
          # at -scale-to 1920 becomes 1920x1080; at -scale-to 480 -> 480x270.
          pdftoppm -png -scale-to 1920 \
            build/SOM_PC_26_Slides.pdf docs/slides/slide
          pdftoppm -png -scale-to 480 \
            build/SOM_PC_26_Slides.pdf docs/slides/thumb
          # Zero-pad filenames (slide-1.png -> slide-01.png) so lexical order = slide order
          cd docs/slides
          for prefix in slide thumb; do
            for f in ${prefix}-*.png; do
              [ -e "$f" ] || continue
              n=$(echo "$f" | sed -E "s/${prefix}-([0-9]+)\.png/\1/")
              nz=$(printf '%02d' "$n")
              [ "$f" = "${prefix}-${nz}.png" ] || mv "$f" "${prefix}-${nz}.png"
            done
          done
          echo "slides: $(ls slide-*.png | wc -l)"
          echo "thumbs: $(ls thumb-*.png | wc -l)"
          du -sh .

      - name: Commit rendered assets back to the branch
        run: |
          git config user.name  "som-slides-bot"
          git config user.email "som-slides-bot@users.noreply.github.com"
          git add docs/slides docs/slides.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Render slide images [skip ci]"
          # A concurrent push could have advanced the branch; rebase to be safe
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
